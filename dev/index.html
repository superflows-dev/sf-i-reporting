  <style>
    body {
      background-color: #efefef;
      margin: 0px;
      font-family: 'Source Sans Pro';
    }

    sf-i-reporting:not(:defined) {
      display: none;
    }

    .d-flex {
      display: flex;
      flex-wrap: wrap;
    }

    .w-30 {
      width: 30%;
    }

    .w-5 {
      width: 5%;
    }

    .w-47-5 {
      width: 47.5%;
    }

    .w-65 {
      width: 65%;
    }

    .w-100-m-0 {
      width: 100%;
    }

    .w-33 {
      width: 30%;
    }

    .w-66 {
      width: 62%;
    }

    .w-50 {
      width: 46%;
    }

    .w-100 {
      width: 94%;
    }

    .mb-20 {
      margin-bottom: 20px;
    }

    .justify-center {
      justify-content: center;
    }

    .align-end {
      align-items: flex-end;
    }

    label {
      color: #666;
    }

    input {
      border: none;
      padding: 10px;
      border-radius: 5px;
      background: #efefef;
      box-shadow: inset 2px 2px 6px rgba(5, 5, 5, 0.2);
      border-top: solid 1px rgba(255, 255, 255, 0.8);
      border-left: solid 1px rgba(255, 255, 255, 0.8);
      border-bottom: solid 1px rgba(255, 255, 255, 0.8);
      border-right: solid 1px rgba(255, 255, 255, 0.8);
      transition: 0.3s;
    }

    input:focus {
      outline-color: #e8e8e8;
      background: #e8e8e8;
      box-shadow: inset 20px 20px 60px #c5c5c5,
        inset -20px -20px 60px #ffffff;
      transition: 0.3s;
    }

    sf-i-reporting::part(button-icon) {

      border-width: 0px;
      border-radius: 5px;
      color: #666;
      background: #efefef;
      box-shadow: 1px 1px 10px 0 rgba(0, 0, 0, 0.25), -1px -1px 10px 0 rgba(255, 255, 255, 0.6);
      border-top: solid 1px rgba(255, 255, 255, 0.3);
      border-left: solid 1px rgba(255, 255, 255, 0.3);
      border-bottom: solid 1px rgba(0, 0, 0, 0.1);
      border-right: solid 1px rgba(0, 0, 0, 0.1);

    }

    sf-i-reporting::part(button-icon-small) {

      border-width: 0px;
      border-radius: 5px;
      color: #666;
      background: #efefef;
      box-shadow: 1px 1px 10px 0 rgba(0, 0, 0, 0.25), -1px -1px 10px 0 rgba(255, 255, 255, 0.6);
      border-top: solid 1px rgba(255, 255, 255, 0.3);
      border-left: solid 1px rgba(255, 255, 255, 0.3);
      border-bottom: solid 1px rgba(0, 0, 0, 0.1);
      border-right: solid 1px rgba(0, 0, 0, 0.1);

    }

    sf-i-reporting::part(badge) {

      color: #666;
      border-bottom: solid 1px rgba(0, 0, 0, 0.1);
      border-right: solid 1px rgba(0, 0, 0, 0.1);
      padding-left: 10px;
      padding-right: 10px;
      padding-top: 5px;
      padding-bottom: 5px;
      border-radius: 10px;
      margin-top: -8px;

    sf-i-reporting::part(title) {

      font-weight: 400;

    }

      color: #666;

      border-radius: 5px;
      color: #666;
      background: #efefef;

      border-top: solid 1px rgba(255, 255, 255, 0.3);

      border: none;
      padding: 10px;
      border-radius: 5px;
      background: #efefef;

    sf-i-reporting::part(input) {
      font-weight: 400;
      border: none;
      padding: 10px;
      border-radius: 5px;
      background: #efefef;
      box-shadow: inset 2px 2px 6px rgba(5, 5, 5, 0.2);
      border-top: solid 1px rgba(255, 255, 255, 0.8);
      border-left: solid 1px rgba(255, 255, 255, 0.8);
      border-bottom: solid 1px rgba(255, 255, 255, 0.8);
      border-right: solid 1px rgba(255, 255, 255, 0.8);
      transition: 0.3s;
    }

    sf-i-reporting::part(input:focus) {
      outline-color: #e8e8e8;
      background: #e8e8e8;
      box-shadow: inset 20px 20px 60px #c5c5c5,
        inset -20px -20px 60px #ffffff;
      transition: 0.3s;
    }

    sf-i-reporting::part(results-title) {
      color: #444;
      font-weight: 400;
    }

    sf-i-reporting::part(td-head) {
      color: #888;
      font-weight: 400;
      padding: 5px;
      vertical-align: middle;
      width: 100%;
    }

    sf-i-reporting::part(td-body) {
      color: #555;
      font-weight: 400;
      /* padding: 5px; */
      vertical-align: middle;
    }

    sf-i-reporting::part(td-action) {
      color: #888;
      font-weight: 400;
      padding: 5px;
      background-color: #efefef;
      vertical-align: middle;
    }

    sf-i-reporting::part(button) {
      color: #666;
      background: #efefef;
      box-shadow: 1px 1px 10px 0 rgba(0, 0, 0, 0.25), -1px -1px 10px 0 rgba(255, 255, 255, 0.6);
      border-top: solid 1px rgba(255, 255, 255, 0.3);
      border-left: solid 1px rgba(255, 255, 255, 0.3);
      border-bottom: solid 1px rgba(0, 0, 0, 0.1);
      border-right: solid 1px rgba(0, 0, 0, 0.1);
      padding-left: 10px;
      padding-right: 10px;
      padding-top: 5px;
      padding-bottom: 5px;
      border-radius: 5px;
    }



    sf-i-reporting::part(button-lg) {
      color: #666;
      background: #efefef;
      box-shadow: 1px 1px 10px 0 rgba(0, 0, 0, 0.25), -1px -1px 10px 0 rgba(255, 255, 255, 0.6);
      border-top: solid 1px rgba(255, 255, 255, 0.3);
      border-left: solid 1px rgba(255, 255, 255, 0.3);
      border-bottom: solid 1px rgba(0, 0, 0, 0.1);
      border-right: solid 1px rgba(0, 0, 0, 0.1);
      padding-left: 10px;
      padding-right: 10px;
      padding-top: 10px;
      padding-bottom: 10px;
      border-radius: 5px;
      font-size: 110%;
    }

      color: #666;
      background: #bbbbbb;
      box-shadow: 1px 1px 10px 0 rgba(0, 0, 0, 0.25), -1px -1px 10px 0 rgba(255, 255, 255, 0.6);

      border-bottom: solid 1px rgba(0, 0, 0, 0.1);
      border-right: solid 1px rgba(0, 0, 0, 0.1);
      padding-left: 10px;
      padding-right: 10px;
      padding-top: 15px;
      padding-bottom: 15px;
      border-radius: 5px;
      font-size: 95%;
    }

    sf-i-reporting::part(reporting-container) {
      /* position: fixed;
        left: 0px;
        top: 0px;
        width: 100%; */
      height: 100vh;
      /* background-color: #efefef;
